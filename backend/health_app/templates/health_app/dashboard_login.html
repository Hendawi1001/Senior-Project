<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardioGo — Doctor Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   rgba(255,255,255,0.05);
      --border:    rgba(255,255,255,0.10);
      --accent:    #7c3aed;
      --accent2:   #06b6d4;
      --red:       #ef4444;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; left: -200px;
      animation: blob1 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 500px; height: 500px;
      background: var(--accent2);
      bottom: -150px; right: -150px;
      animation: blob2 10s ease-in-out infinite alternate;
    }
    @keyframes blob1 { to { transform: translate(80px, 60px) scale(1.1); } }
    @keyframes blob2 { to { transform: translate(-60px, -80px) scale(1.15); } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .logo-text h1 { font-size: 22px; font-weight: 700; }
    .logo-text p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      color: #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">❤️</div>
    <div class="logo-text">
      <h1>CardioGo</h1>
      <p>Doctor Dashboard</p>
    </div>
  </div>

  <h2>Welcome back, Doctor 👨‍⚕️</h2>
  <p class="subtitle">Sign in with your admin credentials to continue.</p>

  <div id="errorMsg" class="error-msg">Invalid credentials. Please try again.</div>

  <div class="field">
    <label>Username</label>
    <input id="username" type="text" placeholder="admin" autocomplete="username" />
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button id="loginBtn" class="btn" onclick="doLogin()">Sign In</button>
</div>

<script>
  async function doLogin() {
    const username  = document.getElementById('username').value.trim();
    const password  = document.getElementById('password').value;
    const btn       = document.getElementById('loginBtn');
    const errDiv    = document.getElementById('errorMsg');
    errDiv.classList.remove('show');

    if (!username || !password) {
      errDiv.textContent = 'Please fill in both fields.';
      errDiv.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || 'Login failed');
      }

      // Verify it's a staff account via the admin stats endpoint
      const testRes = await fetch('/api/admin/stats/', {
        headers: { 'Authorization': 'Bearer ' + data.access }
      });

      if (!testRes.ok) {
        throw new Error('Access denied. Admin accounts only.');
      }

      sessionStorage.setItem('cardiogo_token',    data.access);
      sessionStorage.setItem('cardiogo_refresh',   data.refresh);
      sessionStorage.setItem('cardiogo_username',  username);
      window.location.href = '/dashboard/';
    } catch (e) {
      errDiv.textContent = e.message;
      errDiv.classList.add('show');
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Redirect if already logged in
  if (sessionStorage.getItem('cardiogo_token')) {
    window.location.href = '/dashboard/';
  }
</script>

</body>
</html>
